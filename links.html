<body>

  <div class="cursor" id="cursor"></div>

  <!-- Navigation -->

  <section class="section section-dark" id="contact" style="min-height: 100vh; display: flex; align-items: center;">

      <div class="section-label reveal-up">Links</div>

        <div class="contact-info reveal-left" style="gap: 2rem;">
          <a href="mailto:aliefilham@proton.me" target="_blank" class="contact-item" id="contact-email">
            <div class="contact-icon">📧</div>
            <div>
              <span class="contact-label">Email</span>
              <span class="contact-value">aliefilham@proton.me</span>
            </div>
          </a>
          <a href="https://github.com/itsaliefprog" target="_blank" class="contact-item" id="contact-github">
            <div class="contact-icon">🐙</div>
            <div>
              <span class="contact-label">GitHub</span>
              <span class="contact-value">github.com/itsaliefprog</span>
            </div>
          </a>
          <a href="https://instagram.com/aliefpengenkiamat_" target="_blank" class="contact-item" id="contact-instagram">
            <div class="contact-icon">📸</div>
            <div>
              <span class="contact-label">Instagram</span>
              <span class="contact-value">@aliefpengenkiamat_</span>
            </div>

        </div>
      </div>
