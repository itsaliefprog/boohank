<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <canvas id="particleCanvas"></canvas>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-logo">
      <a href="index.html" style="text-decoration:none; color:inherit;">
        <span class="logo-bracket">&lt;</span>boohank<span class="logo-bracket">/&gt;</span>
      </a>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="about.html" class="nav-link">About</a></li>
      <li><a href="skills.html" class="nav-link">Skills</a></li>
      <li><a href="beyond.html" class="nav-link">Beyond</a></li>
      <li><a href="links.html" class="nav-link">Links</a></li>
    </ul>
    
    <div class="nav-footer" style="margin-top: auto; font-size: 0.8rem; line-height: 1.6;">
      2024 &copy; boohank<br/>
      built with coffee + harsh music
    </div>
  </nav>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <!-- Skills Section -->
  <section class="section section-dark" id="skills" style="min-height: 100vh; display: flex; align-items: center;">
    <div class="container">
      <div class="section-label reveal-up">What I Use</div>
      <h2 class="section-title reveal-up">My <span class="gradient-text">Tech Stack</span></h2>
      <div class="skills-grid reveal-up">

        <div class="skill-category">
          <h3 class="skill-cat-title">
            <span class="cat-icon">🌐</span> Frontend
          </h3>
          <div class="skill-pills">
            <div class="skill-pill">
              <span class="pill-label"><span>📄</span> HTML5</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:95%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>🎨</span> CSS3</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:90%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>⚡</span> JavaScript</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:85%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>⚛️</span> React</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:80%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>🔥</span> Svelte</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:75%"></div></div>
            </div>
          </div>
        </div>

        <div class="skill-category">
          <h3 class="skill-cat-title">
            <span class="cat-icon">⚙️</span> Backend & Tools
          </h3>
          <div class="skill-pills">
            <div class="skill-pill">
              <span class="pill-label"><span>🟢</span> Node.js</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:78%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>🐘</span> PHP</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:70%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>🗄️</span> MySQL</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:72%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>🐙</span> Git & GitHub</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:85%"></div></div>
            </div>
            <div class="skill-pill">
              <span class="pill-label"><span>🎨</span> Figma</span>
              <div class="skill-bar"><div class="skill-fill" style="--w:80%"></div></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>



  <script src="script.js"></script>
</body>
</html>
